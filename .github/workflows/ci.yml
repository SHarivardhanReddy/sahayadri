name: CI - Code Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_model/requirements.txt
          pip install pylint pytest

      - name: Validate Python syntax
        run: |
          python -m py_compile ai_model/ai_server.py
          python -m py_compile ai_model/mcp_server.py
          echo "✓ Python syntax valid"

      - name: Check model files
        run: |
          test -f ai_model/fitness_model.joblib || (echo "ERROR: fitness_model.joblib missing!" && exit 1)
          test -f ai_model/model_features.json || (echo "ERROR: model_features.json missing!" && exit 1)
          echo "✓ All model files present"

      - name: Validate model
        run: |
          python << 'EOF'
          import json
          import joblib
          
          # Load model
          model = joblib.load('ai_model/fitness_model.joblib')
          print(f"✓ Model loaded: {model.n_features_in_} features")
          
          # Load features
          with open('ai_model/model_features.json') as f:
              features = json.load(f)
          print(f"✓ Features config: {len(features)} features defined")
          
          # Validate compatibility
          assert len(features) == model.n_features_in_, f"Feature mismatch: {len(features)} != {model.n_features_in_}"
          print("✓ Model-features validation passed")
          EOF

      - name: Test Flask app initialization
        run: |
          python << 'EOF'
          import sys
          sys.path.insert(0, 'ai_model')
          from ai_server import app
          
          print("✓ Flask app initialized successfully")
          print(f"  Routes: {[rule.rule for rule in app.url_map.iter_rules()]}")
          EOF

      - name: Check Dockerfile validity
        run: |
          docker build --no-cache -t fitness-model:ci-test . 2>&1 | tee docker-build.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✓ Dockerfile builds successfully"
          else
            echo "✗ Dockerfile build failed!"
            exit 1
          fi

      - name: Verify requirements.txt format
        run: |
          python << 'EOF'
          with open('ai_model/requirements.txt') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      parts = line.split('==')
                      if len(parts) == 2:
                          print(f"✓ {line}")
                      else:
                          print(f"⚠ {line} (no pinned version)")
          print("✓ Requirements format valid")
          EOF

  lint:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8

      - name: Lint with flake8
        continue-on-error: true
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 ai_model/ai_server.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 ai_model/ai_server.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  security:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Security check with bandit
        continue-on-error: true
        run: |
          bandit -r ai_model/ -ll --exit-zero || true
          echo "✓ Security scan completed"
