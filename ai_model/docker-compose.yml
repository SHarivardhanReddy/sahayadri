version: '3.8'

services:
  ai_model:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness_ai_model
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5001
    volumes:
      - ./fitness_model.joblib:/app/fitness_model.joblib:ro
      - ./model_features.json:/app/model_features.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - fitness_network

networks:
  fitness_network:
    driver: bridge
